<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شهداء لواء 43 - سبع الدجيل</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Amiri', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #16213e 75%, #1a1a2e 100%);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Islamic pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,215,0,0.03) 35px, rgba(255,215,0,0.03) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(255,215,0,0.02) 35px, rgba(255,215,0,0.02) 70px);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
        }
        
        #loading.hidden {
            display: none;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideInDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
        }
        
        /* Header styles */
        .main-header {
            background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(15,52,96,0.95) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255,215,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: #1a1a2e;
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
            transition: all 0.3s ease;
        }
        
        .logo-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 12px 35px rgba(255,215,0,0.6);
        }
        
        .logo-text h1 {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
            margin: 0 0 5px;
            font-family: 'Amiri', serif;
        }
        
        .logo-text p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin: 0;
            font-weight: 500;
        }
        
        .nav-menu {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,215,0,0.3);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border-color: #ffd700;
            font-weight: 700;
        }
        
        .telegram-btn {
            background: linear-gradient(135deg, #0088cc 0%, #006699 100%);
            border: none;
            color: white;
        }
        
        .telegram-btn:hover {
            background: linear-gradient(135deg, #006699 0%, #004466 100%);
            box-shadow: 0 8px 20px rgba(0,136,204,0.4);
        }
        
        /* Hero section */
        .hero-section {
            padding: 80px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,215,0,0.15);
            padding: 15px 30px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .hero-title {
            font-size: clamp(40px, 8vw, 70px);
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 4px 20px rgba(255,215,0,0.5);
            margin: 0 0 20px;
            font-family: 'Amiri', serif;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: clamp(20px, 4vw, 32px);
            color: rgba(255,255,255,0.9);
            margin: 0 0 30px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .hero-description {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            line-height: 1.8;
            margin: 0 0 50px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0;
            background: rgba(255,215,0,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 30px;
            margin: 0 auto 50px;
            max-width: 800px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .stat-item {
            text-align: center;
            padding: 20px;
            border-left: 1px solid rgba(255,215,0,0.2);
            transition: all 0.3s ease;
        }
        
        .stat-item:first-child {
            border-left: none;
        }
        
        .stat-item:hover {
            background: rgba(255,215,0,0.1);
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
        }
        
        .stat-label {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border: none;
            padding: 18px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.6);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,215,0,0.3);
            padding: 18px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-secondary:hover {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            transform: translateY(-3px);
        }
        
        /* Content sections */
        .content-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 30px;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .section-title {
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            margin: 0 0 15px;
            font-family: 'Amiri', serif;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
        }
        
        .section-divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 0 auto 20px;
        }
        
        /* Martyr cards */
        .martyrs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .martyr-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .martyr-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .martyr-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,215,0,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .martyr-card:hover::before {
            transform: scaleX(1);
        }
        
        .martyr-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
            position: relative;
        }
        
        .martyr-avatar::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
            animation: pulse 2s infinite;
        }
        
        .martyr-name {
            font-size: 20px;
            font-weight: 800;
            color: #ffd700;
            margin: 0 0 15px;
            font-family: 'Amiri', serif;
        }
        
        .martyr-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .martyr-detail {
            background: rgba(255,215,0,0.1);
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* Provinces section */
        .provinces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .province-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .province-card:hover {
            transform: translateY(-5px);
            background: rgba(255,215,0,0.1);
            border-color: #ffd700;
            box-shadow: 0 15px 30px rgba(255,215,0,0.3);
        }
        
        .province-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(255,215,0,0.4);
        }
        
        .province-name {
            font-size: 18px;
            font-weight: 800;
            color: #ffd700;
            margin: 0 0 10px;
        }
        
        .province-count {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
        }
        
        /* Search section */
        .search-section {
            background: rgba(255,215,0,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
        }
        
        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 15px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .search-input:focus {
            border-color: #ffd700;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.2);
        }
        
        .search-select {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 15px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            min-width: 150px;
        }
        
        .search-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,215,0,0.4);
        }
        
        .clear-btn {
            background: rgba(245,101,101,0.2);
            color: #f56565;
            border: 2px solid rgba(245,101,101,0.3);
        }
        
        .clear-btn:hover {
            background: rgba(245,101,101,0.3);
            border-color: #f56565;
        }
        
        .results-info {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Modal styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 25px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(245,101,101,0.2);
            border: 2px solid rgba(245,101,101,0.3);
            color: #f56565;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: rgba(245,101,101,0.3);
            transform: rotate(90deg);
        }
        
        .modal-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 15px 30px rgba(255,215,0,0.4);
        }
        
        .modal-title {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            text-align: center;
            margin: 0 0 30px;
            font-family: 'Amiri', serif;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
        }
        
        .modal-info {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .modal-info-item {
            background: rgba(255,215,0,0.1);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .modal-info-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1a1a2e;
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
        }
        
        .modal-info-text {
            flex: 1;
        }
        
        .modal-info-label {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .modal-info-value {
            font-size: 18px;
            color: #ffd700;
            font-weight: 700;
        }
        
        .modal-bio {
            background: rgba(255,215,0,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 30px;
        }
        
        .modal-bio-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffd700;
            margin: 0 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-bio-text {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            line-height: 1.8;
            margin: 0;
            text-align: right;
        }
        
        .modal-verse {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: #1a1a2e;
        }
        
        .modal-verse-text {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 15px;
            font-family: 'Amiri', serif;
            line-height: 1.8;
        }
        
        .modal-verse-source {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
        }
        
        /* Footer */
        footer {
            background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(15,52,96,0.95) 100%);
            backdrop-filter: blur(20px);
            border-top: 2px solid rgba(255,215,0,0.3);
            padding: 40px 30px;
            text-align: center;
            margin-top: 80px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .footer-title {
            font-size: 28px;
            font-weight: 900;
            color: #ffd700;
            margin: 0 0 15px;
            font-family: 'Amiri', serif;
            text-shadow: 0 2px 10px rgba(255,215,0,0.5);
        }
        
        .footer-description {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            margin: 0 0 25px;
            line-height: 1.6;
        }
        
        .footer-contact {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .footer-contact-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 600;
        }
        
        .footer-telegram {
