<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - شهداء لواء 43</title>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
            direction: rtl;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255,255,255,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        
        #loading.hidden {
            display: none;
        }
        
        /* Modern animations */
        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 40px rgba(255,255,255,0.6); }
        }
        
        .animate-slide-up {
            animation: slideInUp 0.6s ease-out;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 2s infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }
        
        /* Modern scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        /* Islamic pattern decoration */
        .islamic-pattern {
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.05) 35px, rgba(255,255,255,.05) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(255,255,255,.03) 35px, rgba(255,255,255,.03) 70px);
        }
        
        /* Card hover effects */
        .card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card-hover:hover {
            transform: translateY(-10px) scale(1.02);
        }
        
        /* Button effects */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 101, 101, 0.3);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 101, 101, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
        }
        
        /* Form styles */
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 12px 20px;
            color: #2d3748;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 12px 20px;
            color: #2d3748;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 100px;
        }
        
        .form-textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 12px 20px;
            color: #2d3748;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        
        /* Table styles */
        .admin-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);

        .admin-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: 700;
            font-size: 16px;
        }
        
        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            color: #2d3748;
            font-weight: 600;
        }
        
        .admin-table tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .admin-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

                                            onChange={e => setFilterProvince(e.target.value)}
                                            style={{
                                                background: 'rgba(255, 255, 255, 0.9)',
                                                border: '3px solid rgba(255, 255, 255, 0.3)',
                                                borderRadius: '20px',
                                                padding: '18px 25px',
                                                color: '#2d3748',
                                                fontSize: '17px',
                                                fontWeight: '600',
                                                cursor: 'pointer',
                                                outline: 'none',
                                                minWidth: '180px',
                                            }}
                                        >
                                            {provinces.map(p => (
                                                <option key={p} value={p}>{p}</option>
                                            ))}
                                        </select>
                                        
                                        {(search || filterProvince !== "الكل") && (
                                            <button
                                                onClick={() => { setSearch(""); setFilterProvince("الكل"); }}
                                                style={{
                                                    background: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                                                    color: 'white',
                                                    padding: '18px 30px',
                                                    borderRadius: '20px',
                                                    cursor: 'pointer',
                                                    fontSize: '17px',
                                                    fontWeight: '700',
                                                    border: 'none',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    gap: '10px',
                                                    transition: 'all 0.3s ease',
                                                    boxShadow: '0 8px 20px rgba(245, 87, 108, 0.3)',
                                                }}
                                                onMouseEnter={e => {
                                                    e.target.style.transform = 'translateY(-2px)';
                                                    e.target.style.boxShadow = '0 12px 30px rgba(245, 87, 108, 0.4)';
                                                }}
                                                onMouseLeave={e => {
                                                    e.target.style.transform = 'translateY(0)';
                                                    e.target.style.boxShadow = '0 8px 20px rgba(245, 87, 108, 0.3)';
                                                }}
                                            >
                                                <ModernIcon icon="times" />
                                                مسح
                                            </button>
                                        )}
                                    </div>
                                    
                                    <p style={{
                                        color: 'rgba(255, 255, 255, 0.9)',
                                        fontSize: '16px',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px',
                                        fontWeight: '600',
                                    }}>
                                        <ModernIcon icon="info-circle" />

                                    </p>
                                </div>
                            )}

                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                                    gap: '35px',
                                }}>
                                    {[...new Set(martyrs.map(m => m.province))].map(prov => {
                                        const count = martyrs.filter(m => m.province === prov).length;
                                        const icon = PROVINCE_ICONS[prov] || "map-marker-alt";
                                        const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c'];
                                        const color = colors[Math.floor(Math.random() * colors.length)];
                                        
                                        return (
                                            <div
                                                key={prov}
                                                onClick={() => { setFilterProvince(prov); nav("all"); }}

                                                    background: 'rgba(255, 255, 255, 0.95)',
                                                    borderRadius: '25px',
                                                    padding: '40px 30px',
                                                    textAlign: 'center',
                                                    cursor: 'pointer',
                                                    transition: 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                                                    border: '3px solid transparent',
                                                    position: 'relative',
                                                    overflow: 'hidden',
                                                }}
                                                onMouseEnter={e => {
                                                    e.currentTarget.style.transform = 'translateY(-12px) scale(1.02)';
                                                    e.currentTarget.style.boxShadow = `0 25px 50px rgba(0,0,0,0.3), 0 0 40px ${color}40`;
                                                    e.currentTarget.style.borderColor = `${color}60`;
                                                }}
                                                onMouseLeave={e => {
                                                    e.currentTarget.style.transform = 'translateY(0) scale(1)';
                                                    e.currentTarget.style.boxShadow = 'none';
                                                    e.currentTarget.style.borderColor = 'transparent';
                                                }}
                                            >
                                                {/* Background pattern */}
                                                <div className="islamic-pattern" style={{
                                                    position: 'absolute',
                                                    top: 0,
                                                    left: 0,
                                                    right: 0,
                                                    bottom: 0,
                                                    opacity: 0.05,
                                                }} />
                                                
                                                <div style={{
                                                    width: '110px',
                                                    height: '110px',
                                                    borderRadius: '50%',
                                                    margin: '0 auto 25px',
                                                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    position: 'relative',
                                                    boxShadow: isHovered 
                                                        ? '0 20px 40px rgba(102, 126, 234, 0.4), 0 0 60px rgba(102, 126, 234, 0.2)'
                                                        : '0 15px 30px rgba(102, 126, 234, 0.3)',
                                                    border: '5px solid rgba(255, 255, 255, 0.9)',
                                                    transition: 'all 0.4s ease',
                                                }}>
                                                    {martyr.photo ? (
                                                        <img src={martyr.photo} alt={martyr.name} style={{
                                                            width: '100%',
                                                            height: '100%',
                                                            borderRadius: '50%',
                                                            objectFit: 'cover',
                                                            border: '3px solid rgba(255, 255, 255, 0.8)'
                                                        }} />
                                                    ) : (
                                                        <div style={{ textAlign: 'center' }}>
                                                            <ModernIcon icon="user" size={40} color="white" />
                                                            <div style={{ fontSize: '12px', color: 'white', marginTop: '5px' }}>شهيد</div>
                                                        </div>
                                                    )}
                                                </div>
                                                <h4 style={{
                                                    color: '#2d3748',
                                                    fontSize: '22px',
                                                    fontWeight: '800',
                                                    margin: '0 0 20px',
                                                    position: 'relative',
                                                    zIndex: 1,
                                                }}>{prov}</h4>
                                                <div style={{
                                                    background: `linear-gradient(135deg, ${color} 0%, ${color}cc 100%)`,
                                                    color: 'white',
                                                    padding: '12px 25px',
                                                    borderRadius: '30px',
                                                    fontSize: '17px',
                                                    fontWeight: '800',
                                                    display: 'inline-flex',
                                                    alignItems: 'center',
                                                    gap: '10px',
                                                    boxShadow: `0 8px 20px ${color}40`,
                                                    position: 'relative',
                                                    zIndex: 1,
                                                }}>
                                                    <ModernIcon icon="users" size={16} />
                                                    {count} {count === 1 ? "شهيد" : "شهداء"}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                // Martyrs grid
                                filtered.length > 0 ? (
                                    <div style={{
                                        display: 'grid',
                                        gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))',
                                        gap: '40px',
                                    }}>
                                        {filtered.map((m, i) => (
                                            <MartyrCard key={m.id} martyr={m} onClick={setSelected} index={i} />
                                        ))}
                                    </div>
                                ) : (
                                    <div style={{
                                        textAlign: 'center',
                                        padding: '100px 20px',
                                        color: 'rgba(255, 255, 255, 0.9)',
                                        fontSize: '22px',
                                        fontWeight: '600',
                                    }}>
                                        <div style={{ fontSize: '70px', marginBottom: '25px', opacity: 0.7 }}>
                                            <ModernIcon icon="search" />
                                        </div>
                                        لا توجد نتائج مطابقة
                                    </div>
                                )
                            )}
                        </div>
                    )}

                    {/* ── ENHANCED FOOTER ── */}
                    <footer style={{
                        background: 'rgba(255, 255, 255, 0.1)',
                        backdropFilter: 'blur(25px)',
                        borderTop: '1px solid rgba(255, 255, 255, 0.3)',
                        padding: '50px 40px',
                        textAlign: 'center',
                        marginTop: '80px',
                        position: 'relative',
                    }}>
                        <div className="islamic-pattern" style={{
                            position: 'absolute',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            opacity: 0.05,
                        }} />
                        
                        <div style={{ position: 'relative', zIndex: 1 }}>
                                                        <h3 style={{
                                color: 'white',
                                fontSize: '28px',
                                fontWeight: '900',
                                margin: '0 0 15px',
                                textShadow: '0 4px 20px rgba(255,255,255,0.3)',
                            }}>سبع الدجيل</h3>
                            <p style={{
                                color: 'rgba(255, 255, 255, 0.9)',
                                fontSize: '17px',
                                margin: 0,
                                fontWeight: '600',
                            }}>
                                شهداء لواء 43 | تشكيل سبع الدجيل | بل أحياء عند ربهم يُرزقون
                            </p>
                            
                            {/* Telegram Contact in Footer */}
                            <div style={{
                                marginTop: '25px',
                                display: 'flex',
                                justifyContent: 'center',
                                alignItems: 'center',
                                gap: '15px',
                            }}>
                                <span style={{ color: 'rgba(255, 255, 255, 0.7)', fontSize: '14px', fontWeight: '600' }}>
                                    للاستفسار والتواصل:
                                </span>
                                <a
                                    href="https://t.me/Bahaa200228"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    style={{
                                        background: 'linear-gradient(135deg, #0088cc 0%, #006699 100%)',
                                        color: 'white',
                                        padding: '10px 20px',
                                        borderRadius: '25px',
                                        textDecoration: 'none',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '8px',
                                        fontSize: '14px',
                                        fontWeight: '700',
                                        transition: 'all 0.3s ease',
                                        boxShadow: '0 5px 15px rgba(0, 136, 204, 0.3)',
                                    }}
                                    onMouseEnter={e => {
                                        e.currentTarget.style.transform = 'translateY(-2px)';
                                        e.currentTarget.style.boxShadow = '0 8px 25px rgba(0, 136, 204, 0.4)';
                                    }}
                                    onMouseLeave={e => {
                                        e.currentTarget.style.transform = 'translateY(0)';
                                        e.currentTarget.style.boxShadow = '0 5px 15px rgba(0, 136, 204, 0.3)';
                                    }}
                                >
                                    <i className="fab fa-telegram-plane"></i>
                                    @Bahaa200228
                                </a>
                            </div>
                        </div>
                    </footer>

                    {/* Modals */}
                    {selected && <MartyrModal martyr={selected} onClose={() => setSelected(null)} />}
                    {showLogin && <AdminLogin onLogin={() => { setShowLogin(false); setShowAdmin(true); }} onClose={() => setShowLogin(false)} />}
                    {showAdmin && <AdminPanel martyrs={martyrs} setMartyrs={setMartyrs} onClose={() => setShowAdmin(false)} />}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
