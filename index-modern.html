<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبع الدجيل - شهداء لواء 43</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            direction: rtl;
            overflow-x: hidden;
        }
        
        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        
        #loading.hidden {
            display: none;
        }
        
        /* Modern animations */
        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .animate-slide-up {
            animation: slideInUp 0.6s ease-out;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 2s infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        /* Modern scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 20px;">⚔️</div>
            <div>جاري تحميل موقع شهداء لواء 43...</div>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ─── Storage System ───────────────────────────────────────────────────────
        const DB_KEY = "sabaldujail_martyrs";
        const ADMIN_PASS = "sab43admin";

                try {
                    const data = localStorage.getItem(DB_KEY);
                    return data ? JSON.parse(data) : defaultMartyrs;
                } catch {
                    return defaultMartyrs;
                }

            set: (data) => {
                try {
                    localStorage.setItem(DB_KEY, JSON.stringify(data));

                } catch {
                    return false;
                }
            }
        };

        const defaultMartyrs = [
            { id: 1, name: "الشهيد علي حسين الزيدي", province: "بغداد", unit: "لواء 43", date: "2014-10-12", bio: "بطل من أبطال لواء 43، استشهد في معارك الدفاع عن الوطن على أرض نينوى. كان مثالاً للشجاعة والإخلاص في ميادين الشرف.", photo: null },
            { id: 2, name: "الشهيد محمد جاسم العبيدي", province: "كربلاء", unit: "لواء 43", date: "2015-03-05", bio: "استشهد وهو يدافع عن أرض العراق الطاهرة، رحل بعد معركة شرسة لم يتزعزع فيها إيمانه ووطنيته.", photo: null },
            { id: 3, name: "الشهيد حسن عباس النجار", province: "النجف الاشرف", unit: "لواء 43", date: "2015-06-20", bio: "فدى روحه الطاهرة في ميادين الشرف، ابن النجف الأشرف الذي حمل راية الدفاع بكل فخر واعتزاز.", photo: null },
            { id: 4, name: "الشهيد قاسم ناصر المحمداوي", province: "البصرة", unit: "لواء 43", date: "2016-01-15", bio: "من فرسان الجنوب الأوفياء، لبّى نداء الوطن وسقط شهيداً في ساحات النصر والكرامة.", photo: null },
            { id: 5, name: "الشهيد عمر فاضل الشمري", province: "ديالى", unit: "لواء 43", date: "2015-09-08", bio: "ابن ديالى الباسل، حمل السلاح دفاعاً عن أهله وأرضه، ورحل مرفوع الرأس في زمرة الأبطال.", photo: null },
            { id: 6, name: "الشهيد سعد كريم الموسوي", province: "ذي قار", unit: "لواء 43", date: "2016-04-22", bio: "قدّم روحه تقدمةً طاهرة على مذبح الوطن، يُذكر بين إخوانه بعزيمة لا تلين وروح مقاتل حقيقي.", photo: null },
            { id: 7, name: "الشهيد يوسف طالب الحسناوي", province: "واسط", unit: "لواء 43", date: "2014-12-30", bio: "رسم بدمه الزكي خارطة الشرف، وترك أثراً لا يُمحى في قلوب رفاقه وأهل وطنه.", photo: null },
            { id: 8, name: "الشهيد إبراهيم سلمان البدري", province: "بابل", unit: "لواء 43", date: "2015-07-14", bio: "فارس من بابل الحضارة، لبّى فتوى الجهاد الكفائي وسقط مدافعاً عن كل شبر من أرض العراق.", photo: null },
        ];

        // ─── Modern Icons ─────────────────────────────────────────────────────────
        const ModernIcon = ({ icon, size = 24, color = "white", className = "" }) => (
            <i className={`fas fa-${icon} ${className}`} style={{ fontSize: size, color }}></i>

        // ─── Province Icons ───────────────────────────────────────────────────────
        const PROVINCE_ICONS = {
            "بغداد": "mosque",

            "النجف الاشرف": "moon",
            "البصرة": "anchor",
            "ديالى": "leaf",
            "ذي قار": "vase",
            "واسط": "seedling",
            "بابل": "landmark",
            "ميسان": "water",
            "المثنى": "sun",
            "صلاح الدين": "shield-alt",
            "الأنبار": "cactus",

        // ─── Modern Martyr Card ───────────────────────────────────────────────────
        const MartyrCard = ({ martyr, onClick, index = 0 }) => {
            const [isHovered, setIsHovered] = useState(false);
            
            return (
                <div
                    onClick={() => onClick(martyr)}

                    className={`animate-slide-up ${isHovered ? 'animate-pulse' : ''}`}
                    style={{

                            ? 'linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%)'

                        padding: '30px',

                        width: '100px',
                        height: '100px',

                        justifyContent: 'center',

                        boxShadow: '0 10px 25px rgba(102, 126, 234, 0.3)',

                            borderRadius: '25px',
                            fontSize: '14px',
                            fontWeight: '600',

                            fontSize: '14px',
                            fontWeight: '600',
                            textAlign: 'center',

                    {/* Hover effect overlay */}
                    {isHovered && (
                        <div style={{
                            position: 'absolute',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            background: 'linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%)',
                            pointerEvents: 'none',
                            borderRadius: '20px',
                        }} />
                    )}
                </div>
            );
        };

        // ─── Modern Modal ─────────────────────────────────────────────────────────
        const MartyrModal = ({ martyr, onClose }) => {
            if (!martyr) return null;
            
            return (
                <div onClick={onClose} style={{
                    position: 'fixed',
                    inset: 0,
                    zIndex: 2000,
                    background: 'rgba(0, 0, 0, 0.8)',
                    backdropFilter: 'blur(10px)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '20px',
                    animation: 'fadeIn 0.3s ease-out',
                }}>
                    <div onClick={e => e.stopPropagation()} style={{
                        background: 'rgba(255, 255, 255, 0.98)',
                        borderRadius: '25px',
                        padding: '40px',
                        maxWidth: '600px',
                        width: '100%',
                        position: 'relative',
                        direction: 'rtl',
                        boxShadow: '0 25px 50px rgba(0,0,0,0.3)',
                        maxHeight: '90vh',
                        overflowY: 'auto',
                        backdropFilter: 'blur(20px)',
                        border: '1px solid rgba(255, 255, 255, 0.2)',
                    }}>
                        {/* Close button */}
                        <button onClick={onClose} style={{
                            position: 'absolute',
                            top: '20px',
                            left: '20px',
                            background: 'rgba(102, 126, 234, 0.1)',
                            border: 'none',
                            color: '#667eea',
                            width: '40px',
                            height: '40px',
                            borderRadius: '50%',
                            cursor: 'pointer',
                            fontSize: '18px',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            transition: 'all 0.3s ease',
                        }}
                        onMouseEnter={e => {
                            e.target.style.background = '#667eea';
                            e.target.style.color = 'white';
                        }}
                        onMouseLeave={e => {
                            e.target.style.background = 'rgba(102, 126, 234, 0.1)';

                        }}>
                            <ModernIcon icon="times" />
                        </button>

                        {/* Content */}
                        <div style={{ textAlign: 'center' }}>
                            {/* Profile */}

                                width: '120px',
                                height: '120px',
                                borderRadius: '50%',
                                margin: '0 auto 25px',
                                background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                boxShadow: '0 15px 35px rgba(102, 126, 234, 0.3)',
                                border: '5px solid rgba(255, 255, 255, 0.9)',
                            }}>
                                {martyr.photo ? (
                                    <img src={martyr.photo} alt={martyr.name} style={{
                                        width: '100%',
                                        height: '100%',
                                        borderRadius: '50%',
                                        objectFit: 'cover'
                                    }} />
                                ) : (
                                    <ModernIcon icon="user" size={50} color="white" />
                                )}
                            </div>

                            {/* Name */}
                            <h2 style={{
                                color: '#2d3748',
                                fontSize: '28px',
                                fontWeight: '700',
                                margin: '0 0 20px',
                                lineHeight: '1.3',
                            }}>{martyr.name}</h2>

                            {/* Info */}
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '15px', marginBottom: '25px' }}>
                                {[
                                    { icon: 'map-marker-alt', label: 'المحافظة', value: martyr.province },
                                    { icon: 'shield-alt', label: 'الوحدة', value: martyr.unit },
                                    { icon: 'calendar', label: 'تاريخ الاستشهاد', value: martyr.date },
                                ].map(({ icon, label, value }) => (
                                    <div key={label} style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '15px',
                                        padding: '15px',
                                        background: 'rgba(102, 126, 234, 0.05)',
                                        borderRadius: '15px',
                                        border: '1px solid rgba(102, 126, 234, 0.1)',
                                    }}>
                                        <div style={{
                                            width: '40px',
                                            height: '40px',
                                            borderRadius: '50%',
                                            background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                            display: 'flex',
                                            alignItems: 'center',
                                            justifyContent: 'center',
                                        }}>
                                            <ModernIcon icon={icon} size={16} color="white" />
                                        </div>
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ color: '#718096', fontSize: '12px', marginBottom: '2px' }}>{label}</div>
                                            <div style={{ color: '#2d3748', fontSize: '16px', fontWeight: '600' }}>{value}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Bio */}
                            <div style={{
                                background: 'rgba(102, 126, 234, 0.05)',
                                padding: '20px',
                                borderRadius: '15px',
                                border: '1px solid rgba(102, 126, 234, 0.1)',
                                textAlign: 'right',
                            }}>
                                <h4 style={{
                                    color: '#667eea',
                                    fontSize: '18px',
                                    fontWeight: '700',
                                    margin: '0 0 10px',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '10px',
                                }}>
                                    <ModernIcon icon="book" />

                                <p style={{
                                    color: '#4a5568',
                                    fontSize: '16px',
                                    lineHeight: '1.8',
                                    margin: 0,

                            </div>

                            {/* Verse */}
                            <div style={{
                                marginTop: '25px',
                                padding: '20px',
                                background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                borderRadius: '15px',
                                color: 'white',
                                textAlign: 'center',
                            }}>
                                <p style={{
                                    fontSize: '16px',
                                    lineHeight: '2',
                                    margin: 0,
                                    fontStyle: 'italic',
                                }}>
                                    ﴿ وَلَا تَحْسَبَنَّ الَّذِينَ قُتِلُوا فِي سَبِيلِ اللَّهِ أَمْوَاتًا ۚ بَلْ أَحْيَاءٌ عِندَ رَبِّهِمْ يُرْزَقُونَ ﴾

        // ─── Admin Login ─────────────────────────────────────────────────────────
        const AdminLogin = ({ onLogin, onClose }) => {
            const [pass, setPass] = useState("");
            const [err, setErr] = useState(false);
            const [showPassword, setShowPassword] = useState(false);
            
            const submit = () => {
                if (pass === ADMIN_PASS) { 
                    onLogin(); 
                    setErr(false); 
                } else {
                    setErr(true);
                }
            };
            
            return (
                <div onClick={onClose} style={{
                    position: 'fixed',
                    inset: 0,
                    zIndex: 3000,
                    background: 'rgba(0, 0, 0, 0.8)',
                    backdropFilter: 'blur(10px)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '20px',
                }}>
                    <div onClick={e => e.stopPropagation()} style={{
                        background: 'rgba(255, 255, 255, 0.98)',
                        borderRadius: '25px',
                        padding: '40px',
                        maxWidth: '400px',
                        width: '100%',
                        direction: 'rtl',
                        textAlign: 'center',
                        boxShadow: '0 25px 50px rgba(0,0,0,0.3)',
                        backdropFilter: 'blur(20px)',
                        border: '1px solid rgba(255, 255, 255, 0.2)',
                    }}>

                        </div>
                        <h2 style={{
                            color: '#2d3748',
                            fontSize: '24px',
                            fontWeight: '700',
                            marginBottom: '10px',
                        }}>لوحة الإدارة</h2>
                        <p style={{
                            color: '#718096',
                            fontSize: '16px',
                            marginBottom: '30px',
                        }}>أدخل كلمة المرور للدخول</p>
                        
                        <div style={{ position: 'relative', marginBottom: '20px' }}>
                            <input
                                type={showPassword ? "text" : "password"}
                                value={pass}
                                onChange={e => { setPass(e.target.value); setErr(false); }}
                                onKeyDown={e => e.key === "Enter" && submit()}
                                placeholder="كلمة المرور"
                                style={{
                                    width: '100%',
                                    background: 'rgba(102, 126, 234, 0.05)',
                                    border: err ? '2px solid #f56565' : '2px solid rgba(102, 126, 234, 0.2)',
                                    borderRadius: '15px',
                                    padding: '15px 50px 15px 20px',
                                    color: '#2d3748',
                                    fontSize: '16px',
                                    outline: 'none',
                                    transition: 'all 0.3s ease',
                                }}
                                onFocus={e => {
                                    e.target.style.borderColor = '#667eea';
                                    e.target.style.boxShadow = '0 0 0 3px rgba(102, 126, 234, 0.1)';
                                }}
                                onBlur={e => {
                                    e.target.style.borderColor = err ? '#f56565' : 'rgba(102, 126, 234, 0.2)';
                                    e.target.style.boxShadow = 'none';
                                }}
                            />
                            <button
                                onClick={() => setShowPassword(!showPassword)}
                                style={{
                                    position: 'absolute',
                                    left: '15px',
                                    top: '50%',
                                    transform: 'translateY(-50%)',
                                    background: 'none',
                                    border: 'none',
                                    color: '#718096',
                                    cursor: 'pointer',
                                    fontSize: '18px',
                                }}
                            >
                                <ModernIcon icon={showPassword ? "eye-slash" : "eye"} />
                            </button>
                        </div>
                        
                        {err && (
                            <p style={{
                                color: '#f56565',
                                fontSize: '14px',
                                marginBottom: '20px',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                gap: '8px',
                            }}>
                                <ModernIcon icon="exclamation-circle" />

                            </p>

                        <div style={{ display: 'flex', gap: '15px', marginTop: '25px' }}>
                            <button onClick={submit} style={{
                                flex: 1,
                                background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',

                                color: 'white',

                                fontSize: '16px',
                                fontWeight: '700',
                                transition: 'all 0.3s ease',

                                                }}>{prov}</h4>
                                                <div style={{
                                                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                                    color: 'white',
                                                    padding: '10px 20px',
                                                    borderRadius: '25px',
                                                    fontSize: '16px',
                                                    fontWeight: '700',
                                                    display: 'inline-flex',
                                                    alignItems: 'center',
                                                    gap: '8px',
                                                }}>
                                                    <ModernIcon icon="users" size={14} />
                                                    {count} {count === 1 ? "شهيد" : "شهداء"}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                // Martyrs grid
                                filtered.length > 0 ? (
                                    <div style={{
                                        display: 'grid',
                                        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                                        gap: '30px',
                                    }}>
                                        {filtered.map((m, i) => (
                                            <MartyrCard key={m.id} martyr={m} onClick={setSelected} index={i} />
                                        ))}
                                    </div>
                                ) : (
                                    <div style={{
                                        textAlign: 'center',
                                        padding: '80px 20px',
                                        color: 'rgba(255, 255, 255, 0.8)',
                                        fontSize: '20px',
                                    }}>
                                        <div style={{ fontSize: '60px', marginBottom: '20px', opacity: 0.6 }}>
                                            <ModernIcon icon="search" />
                                        </div>
                                        لا توجد نتائج مطابقة
                                    </div>
                                )
                            )}
                        </div>
                    )}

                    {/* ── FOOTER ── */}
                    <footer style={{
                        background: 'rgba(255, 255, 255, 0.1)',
                        backdropFilter: 'blur(20px)',
                        borderTop: '1px solid rgba(255, 255, 255, 0.2)',
                        padding: '40px 30px',
                        textAlign: 'center',
                        marginTop: '60px',
                    }}>
                        <div style={{
                            display: 'flex',
                            justifyContent: 'center',
                            gap: '10px',
                            marginBottom: '20px',
                        }}>
                            <ModernIcon icon="star" color="white" />
                            <ModernIcon icon="star" color="white" />
                            <ModernIcon icon="star" color="white" />
                        </div>
                        <h3 style={{
                            color: 'white',
                            fontSize: '24px',
                            fontWeight: '700',
                            margin: '0 0 10px',
                        }}>سبع الدجيل</h3>
                        <p style={{
                            color: 'rgba(255, 255, 255, 0.8)',
                            fontSize: '16px',
                            margin: 0,
                        }}>
                            شهداء لواء 43 | تشكيل سبع الدجيل | بل أحياء عند ربهم يُرزقون
                        </p>
                    </footer>

                    {/* Modals */}
                    {selected && <MartyrModal martyr={selected} onClose={() => setSelected(null)} />}
                    {showLogin && <AdminLogin onLogin={() => { setShowLogin(false); setShowAdmin(true); }} onClose={() => setShowLogin(false)} />}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
